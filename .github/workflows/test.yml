# Requirements: testing-infrastructure.1.1, testing-infrastructure.1.2, testing-infrastructure.1.4, testing-infrastructure.5.1, testing-infrastructure.5.2
name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25.5.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit
        env:
          CI: true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: unit
          name: unit-tests

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: test-results/unit/

  property-tests:
    name: Property-Based Tests
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25.5.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run property-based tests
        run: npm test -- tests/requirements/**/*-pbt.test.ts
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: property-test-results
          path: test-results/

  functional-tests:
    name: Functional Tests (${{ matrix.browser }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25.5.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Build application
        run: npm run build

      - name: Run functional tests
        run: npm run test:functional:${{ matrix.browser }}
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: functional-test-results-${{ matrix.browser }}
          path: test-results/functional/

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-${{ matrix.browser }}
          path: test-results/functional/**/*.png

      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: videos-${{ matrix.browser }}
          path: test-results/functional/**/*.webm

  coverage-check:
    name: Coverage Check
    runs-on: macos-latest
    needs: [unit-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25.5.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run coverage check
        run: npm run test:unit
        env:
          CI: true

      - name: Check coverage thresholds
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "Coverage report found"
            cat coverage/coverage-summary.json
            
            # Extract coverage percentages
            STATEMENTS=$(node -p "JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json', 'utf8')).total.statements.pct")
            BRANCHES=$(node -p "JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json', 'utf8')).total.branches.pct")
            FUNCTIONS=$(node -p "JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json', 'utf8')).total.functions.pct")
            LINES=$(node -p "JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json', 'utf8')).total.lines.pct")
            
            echo "Coverage Summary:"
            echo "  Statements: ${STATEMENTS}%"
            echo "  Branches: ${BRANCHES}%"
            echo "  Functions: ${FUNCTIONS}%"
            echo "  Lines: ${LINES}%"
            
            # Check if coverage meets minimum thresholds (85%)
            THRESHOLD=85
            FAILED=0
            
            if (( $(echo "$STATEMENTS < $THRESHOLD" | bc -l) )); then
              echo "❌ Statements coverage ${STATEMENTS}% is below threshold ${THRESHOLD}%"
              FAILED=1
            else
              echo "✅ Statements coverage ${STATEMENTS}% meets threshold ${THRESHOLD}%"
            fi
            
            if (( $(echo "$BRANCHES < $THRESHOLD" | bc -l) )); then
              echo "❌ Branches coverage ${BRANCHES}% is below threshold ${THRESHOLD}%"
              FAILED=1
            else
              echo "✅ Branches coverage ${BRANCHES}% meets threshold ${THRESHOLD}%"
            fi
            
            if (( $(echo "$FUNCTIONS < $THRESHOLD" | bc -l) )); then
              echo "❌ Functions coverage ${FUNCTIONS}% is below threshold ${THRESHOLD}%"
              FAILED=1
            else
              echo "✅ Functions coverage ${FUNCTIONS}% meets threshold ${THRESHOLD}%"
            fi
            
            if (( $(echo "$LINES < $THRESHOLD" | bc -l) )); then
              echo "❌ Lines coverage ${LINES}% is below threshold ${THRESHOLD}%"
              FAILED=1
            else
              echo "✅ Lines coverage ${LINES}% meets threshold ${THRESHOLD}%"
            fi
            
            if [ $FAILED -eq 1 ]; then
              echo ""
              echo "Coverage check failed! All metrics must be at least ${THRESHOLD}%"
              exit 1
            fi
            
            echo ""
            echo "✅ All coverage thresholds met!"
          else
            echo "❌ Coverage report not found"
            exit 1
          fi

      - name: Generate coverage badge
        if: success()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            LINES=$(node -p "JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json', 'utf8')).total.lines.pct")
            echo "Coverage: ${LINES}%" > coverage/badge.txt
          fi

      - name: Upload coverage badge
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-badge
          path: coverage/badge.txt

  lint-and-format:
    name: Lint and Format Check
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25.5.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

  build-check:
    name: Build Check
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25.5.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Check build artifacts
        run: |
          if [ -d dist ]; then
            echo "Build successful"
            ls -la dist/
          else
            echo "Build failed - dist directory not found"
            exit 1
          fi

  test-summary:
    name: Test Summary
    runs-on: macos-latest
    needs:
      [unit-tests, property-tests, functional-tests, coverage-check, lint-and-format, build-check]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download coverage badge
        uses: actions/download-artifact@v4
        if: needs.coverage-check.result == 'success'
        with:
          name: coverage-badge
          path: ./artifacts

      - name: Check test results
        run: |
          echo "=========================================="
          echo "         Test Suite Summary"
          echo "=========================================="
          echo ""
          echo "Unit tests:        ${{ needs.unit-tests.result }}"
          echo "Property tests:    ${{ needs.property-tests.result }}"
          echo "Functional tests:  ${{ needs.functional-tests.result }}"
          echo "Coverage check:    ${{ needs.coverage-check.result }}"
          echo "Lint and format:   ${{ needs.lint-and-format.result }}"
          echo "Build check:       ${{ needs.build-check.result }}"
          echo ""

          if [ -f ./artifacts/badge.txt ]; then
            echo "Coverage: $(cat ./artifacts/badge.txt)"
            echo ""
          fi

          echo "=========================================="

      - name: Fail if any test failed
        if: |
          needs.unit-tests.result == 'failure' ||
          needs.property-tests.result == 'failure' ||
          needs.functional-tests.result == 'failure' ||
          needs.coverage-check.result == 'failure' ||
          needs.lint-and-format.result == 'failure' ||
          needs.build-check.result == 'failure'
        run: |
          echo "❌ Test suite failed!"
          echo ""
          echo "Failed jobs:"
          [ "${{ needs.unit-tests.result }}" == "failure" ] && echo "  - Unit tests"
          [ "${{ needs.property-tests.result }}" == "failure" ] && echo "  - Property tests"
          [ "${{ needs.functional-tests.result }}" == "failure" ] && echo "  - Functional tests"
          [ "${{ needs.coverage-check.result }}" == "failure" ] && echo "  - Coverage check"
          [ "${{ needs.lint-and-format.result }}" == "failure" ] && echo "  - Lint and format"
          [ "${{ needs.build-check.result }}" == "failure" ] && echo "  - Build check"
          exit 1

      - name: Success message
        if: |
          needs.unit-tests.result == 'success' &&
          needs.property-tests.result == 'success' &&
          needs.functional-tests.result == 'success' &&
          needs.coverage-check.result == 'success' &&
          needs.lint-and-format.result == 'success' &&
          needs.build-check.result == 'success'
        run: |
          echo "✅ All tests passed successfully!"
